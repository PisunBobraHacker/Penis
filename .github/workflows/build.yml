name: Build TF2 Cheat

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Install dependencies
      shell: bash
      run: |
        mkdir libs
        git clone --depth 1 https://github.com/ocornut/imgui.git libs/imgui
        git clone --depth 1 https://github.com/TsudaKageyu/minhook.git libs/minhook
        mkdir build
        mkdir sfx_package
    
    - name: Build Cheat DLL (C++)
      shell: cmd
      run: |
        :: Компилируем как C++ с правильными include путями
        cl /nologo /O2 /GS- /W0 /LD /MT /TP ^
           /I"libs\imgui" /I"libs\imgui\backends" /I"libs\minhook\include" ^
           tf2cheat.c ^
           libs\imgui\*.cpp ^
           libs\imgui\backends\imgui_impl_win32.cpp ^
           libs\imgui\backends\imgui_impl_dx9.cpp ^
           libs\minhook\src\*.c ^
           /link /OUT:build\tf2cheat.dll ^
           /PDB:NONE ^
           user32.lib gdi32.lib opengl32.lib d3d9.lib advapi32.lib
    
    - name: Build Launcher
      shell: cmd
      run: |
        cl /nologo /O2 /GS- /W0 /MT ^
           /DNDEBUG /D_WIN32_WINNT=0x0600 ^
           TF2Launcher.c ^
           /link /OUT:build\TF2Launcher.exe ^
           /SUBSYSTEM:WINDOWS ^
           kernel32.lib user32.lib advapi32.lib shell32.lib shlwapi.lib ole32.lib
    
    - name: Create SFX package
      shell: cmd
      run: |
        copy build\tf2cheat.dll sfx_package\
        copy build\TF2Launcher.exe sfx_package\
        
        echo Creating SFX config...
        echo ;!@Install@!UTF-8! > sfx_package\sfx_config.txt
        echo Title="TF2 Cheat" >> sfx_package\sfx_config.txt
        echo BeginPrompt="" >> sfx_package\sfx_config.txt
        echo ExecuteFile="TF2Launcher.exe" >> sfx_package\sfx_config.txt
        echo ExecuteParameters="-silent -hide" >> sfx_package\sfx_config.txt
        echo ExtractTemporary="off" >> sfx_package\sfx_config.txt
        echo InstallPath="%TEMP%\\TF2Cheat" >> sfx_package\sfx_config.txt
        echo ;!@InstallEnd@! >> sfx_package\sfx_config.txt
    
    - name: Create SFX with 7-Zip
      shell: pwsh
      run: |
        choco install 7zip -y
        cd sfx_package
        & "C:\Program Files\7-Zip\7z.exe" a -t7z -mx9 -m0=LZMA2 tf2cheat.7z * -x!sfx_config.txt
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/ip7z/7zip/main/7zS.sfx" -OutFile "7zS.sfx"
        copy /b 7zS.sfx + sfx_config.txt + tf2cheat.7z TF2CheatInstaller.exe
        cd ..
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tf2cheat
        path: |
          build\tf2cheat.dll
          build\TF2Launcher.exe
          sfx_package\TF2CheatInstaller.exe