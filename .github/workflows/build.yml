name: Build TF2 Cheat Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Build Cheat DLL
      shell: cmd
      run: |
        echo Building tf2cheat.dll...
        cl /nologo /O2 /GS- /W0 /LD /MT /TP ^
           tf2cheat.c ^
           /link /OUT:tf2cheat.dll /PDB:NONE ^
           user32.lib gdi32.lib d3d9.lib advapi32.lib
        if %errorlevel% neq 0 exit /b %errorlevel%
        echo [OK] tf2cheat.dll built!
    
    - name: Build Injector
      shell: cmd
      run: |
        echo Building TF2Injector.exe...
        cl /nologo /O2 /GS- /W0 /MT ^
           injector.c ^
           /link /OUT:TF2Injector.exe /SUBSYSTEM:WINDOWS ^
           user32.lib gdi32.lib advapi32.lib comctl32.lib shell32.lib
        if %errorlevel% neq 0 exit /b %errorlevel%
        echo [OK] TF2Injector.exe built!
    
    - name: Create launcher scripts
      shell: cmd
      run: |
        echo @echo off > RUN_ME.bat
        echo title TF2 Cheat Launcher >> RUN_ME.bat
        echo color 0A >> RUN_ME.bat
        echo echo ======================================== >> RUN_ME.bat
        echo echo    TF2 CHEAT LAUNCHER >> RUN_ME.bat
        echo echo ======================================== >> RUN_ME.bat
        echo echo. >> RUN_ME.bat
        echo if not exist "tf2cheat.dll" ( >> RUN_ME.bat
        echo     echo [!] tf2cheat.dll not found! >> RUN_ME.bat
        echo     echo [!] Please run build_all.bat first. >> RUN_ME.bat
        echo     pause >> RUN_ME.bat
        echo     exit /b 1 >> RUN_ME.bat
        echo ) >> RUN_ME.bat
        echo if not exist "TF2Injector.exe" ( >> RUN_ME.bat
        echo     echo [!] TF2Injector.exe not found! >> RUN_ME.bat
        echo     echo [!] Please run build_all.bat first. >> RUN_ME.bat
        echo     pause >> RUN_ME.bat
        echo     exit /b 1 >> RUN_ME.bat
        echo ) >> RUN_ME.bat
        echo echo [*] Starting Injector... >> RUN_ME.bat
        echo start "" TF2Injector.exe >> RUN_ME.bat
        echo echo [OK] Injector started! >> RUN_ME.bat
        echo echo. >> RUN_ME.bat
        echo echo [*] Waiting for TF2 to start... >> RUN_ME.bat
        echo echo [*] Injection happens automatically >> RUN_ME.bat
        echo echo [*] Press INSERT in game to open menu >> RUN_ME.bat
        echo echo. >> RUN_ME.bat
        echo echo ======================================== >> RUN_ME.bat
        echo echo    INJECTOR IS RUNNING >> RUN_ME.bat
        echo echo ======================================== >> RUN_ME.bat
        echo echo. >> RUN_ME.bat
        echo echo Close this window when done. >> RUN_ME.bat
        echo echo. >> RUN_ME.bat
        echo timeout /t 3 /nobreak >nul >> RUN_ME.bat
        echo echo [*] Injector is running in background >> RUN_ME.bat
        echo echo [*] Check system tray for status >> RUN_ME.bat
        echo echo. >> RUN_ME.bat
        echo pause >> RUN_ME.bat
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TF2Cheat
        path: |
          tf2cheat.dll
          TF2Injector.exe
          RUN_ME.bat
          README.md
    
    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./tf2cheat.dll
        asset_name: tf2cheat.dll
        asset_content_type: application/octet-stream
    
    - name: Upload injector to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./TF2Injector.exe
        asset_name: TF2Injector.exe
        asset_content_type: application/vnd.microsoft.portable-executable